<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#EA4335;--yellow:#FBBC04;--green:#34A853;--blue:#4285F4;
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--text:#e6edf3;--text2:#8b949e;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}

/* PARTICLE GRID */
.particle-grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.particle-grid::before{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:radial-gradient(circle 1.5px,rgba(66,133,244,.15) 1px,transparent 1px);
  background-size:40px 40px;
  animation:particlePulse 4s ease-in-out infinite alternate;
}
.particle-grid::after{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background-image:radial-gradient(circle 1px,rgba(234,67,53,.12) 1px,transparent 1px);
  background-size:40px 40px;background-position:20px 20px;
  animation:particlePulse 4s ease-in-out infinite alternate-reverse;
}
@keyframes particlePulse{0%{opacity:.3}100%{opacity:.8}}

/* MATRIX RAIN */
.matrix-rain{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
.matrix-rain::before,.matrix-rain::after{
  content:'01001 10110 01011 11001 00110 10011 01101 11010 00101 10100 01110 11100 00111 10001 01010 10101 00011 11011 00100 10010';
  position:absolute;top:-100%;left:0;width:100%;height:300%;
  font-family:monospace;font-size:10px;line-height:1.8;letter-spacing:18px;
  word-break:break-all;white-space:pre-wrap;
  color:rgba(52,168,83,.06);
  animation:matrixFall 20s linear infinite;
}
.matrix-rain::after{
  color:rgba(66,133,244,.04);animation-duration:25s;animation-delay:-8s;letter-spacing:24px;
}
@keyframes matrixFall{0%{transform:translateY(-33%)}100%{transform:translateY(0)}}

/* SCANNING LINE */
.scan-line{
  position:fixed;top:0;left:0;width:100%;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--blue),var(--green),var(--yellow),var(--red),transparent);
  animation:scanDown 6s ease-in-out infinite;
  box-shadow:0 0 20px var(--blue),0 0 60px var(--blue);
  opacity:.6;
}
@keyframes scanDown{0%{top:-2px}50%{top:100%}100%{top:-2px}}

/* FLOATING ORBS */
.orbs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.orb{
  position:absolute;border-radius:50%;filter:blur(40px);opacity:.12;
  animation:orbFloat 12s ease-in-out infinite;
}
.orb:nth-child(1){width:200px;height:200px;background:var(--red);top:20%;left:10%;animation-delay:0s}
.orb:nth-child(2){width:250px;height:250px;background:var(--yellow);top:60%;left:80%;animation-delay:-3s}
.orb:nth-child(3){width:180px;height:180px;background:var(--green);top:80%;left:30%;animation-delay:-6s}
.orb:nth-child(4){width:220px;height:220px;background:var(--blue);top:10%;left:70%;animation-delay:-9s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(30px,-40px) scale(1.1)}
  50%{transform:translate(-20px,30px) scale(.9)}
  75%{transform:translate(40px,20px) scale(1.05)}
}

/* CONTAINER */
.container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative;z-index:2}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:120px 24px 80px;position:relative}
.hero-title{font-size:clamp(3rem,8vw,7rem);font-weight:900;letter-spacing:-2px;position:relative;display:inline-block}
.hero-title .chrome-gradient{
  background:linear-gradient(135deg,var(--red),var(--yellow),var(--green),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* GLITCH */
.glitch{position:relative;display:inline-block}
.glitch::before,.glitch::after{
  content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;
  background:var(--bg);overflow:hidden;
  -webkit-background-clip:text;background-clip:text;
}
.glitch::before{
  left:2px;text-shadow:-2px 0 var(--red);
  animation:glitch1 3s infinite linear alternate-reverse;
  clip-path:inset(0 0 65% 0);
  -webkit-text-fill-color:transparent;
  background:linear-gradient(135deg,var(--red),var(--yellow),var(--green),var(--blue));
  -webkit-background-clip:text;background-clip:text;
}
.glitch::after{
  left:-2px;text-shadow:2px 0 var(--blue);
  animation:glitch2 3s infinite linear alternate-reverse;
  clip-path:inset(35% 0 0 0);
  -webkit-text-fill-color:transparent;
  background:linear-gradient(135deg,var(--red),var(--yellow),var(--green),var(--blue));
  -webkit-background-clip:text;background-clip:text;
}
@keyframes glitch1{
  0%,100%{clip-path:inset(0 0 65% 0);transform:translate(0)}
  20%{clip-path:inset(10% 0 55% 0);transform:translate(-3px,2px)}
  40%{clip-path:inset(25% 0 40% 0);transform:translate(3px,-1px)}
  60%{clip-path:inset(5% 0 60% 0);transform:translate(-2px,1px)}
  80%{clip-path:inset(15% 0 50% 0);transform:translate(2px,-2px)}
}
@keyframes glitch2{
  0%,100%{clip-path:inset(35% 0 0 0);transform:translate(0)}
  20%{clip-path:inset(50% 0 0 0);transform:translate(3px,1px)}
  40%{clip-path:inset(30% 0 10% 0);transform:translate(-2px,-1px)}
  60%{clip-path:inset(45% 0 5% 0);transform:translate(2px,2px)}
  80%{clip-path:inset(40% 0 0 0);transform:translate(-3px,-2px)}
}

/* TYPING */
.hero-sub{
  font-size:clamp(1rem,2.5vw,1.5rem);color:var(--text2);margin-top:16px;
  border-right:2px solid var(--blue);white-space:nowrap;overflow:hidden;
  width:0;animation:typing 3s steps(35) 1s forwards,blink .7s step-end infinite;
}
@keyframes typing{to{width:35ch}}
@keyframes blink{50%{border-color:transparent}}

/* STATS */
.stats{display:flex;gap:48px;margin-top:48px;flex-wrap:wrap;justify-content:center}
.stat{text-align:center}
.stat-num{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:.85rem;color:var(--text2);margin-top:4px}

/* CTA BUTTON */
.btn-cta{
  display:inline-block;margin-top:48px;padding:16px 48px;font-size:1.1rem;font-weight:700;
  border:none;border-radius:50px;cursor:pointer;color:#fff;
  background:linear-gradient(135deg,var(--blue),var(--green));
  position:relative;z-index:1;transition:transform .2s;
}
.btn-cta::before{
  content:'';position:absolute;inset:-3px;border-radius:50px;
  background:linear-gradient(135deg,var(--blue),var(--green));
  z-index:-1;filter:blur(15px);opacity:.6;
  animation:neonPulse 2s ease-in-out infinite;
}
.btn-cta:hover{transform:scale(1.05)}
@keyframes neonPulse{0%,100%{opacity:.4;filter:blur(15px)}50%{opacity:.8;filter:blur(25px)}}

/* SECTION */
section{padding:100px 0;position:relative;z-index:2}
.section-title{
  font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;text-align:center;margin-bottom:60px;
  background:linear-gradient(135deg,var(--text),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* FEATURED CARDS */
.featured-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:32px;max-width:1100px;margin:0 auto;padding:0 24px}
.featured-card{
  position:relative;border-radius:16px;padding:2px;overflow:hidden;
  transition:transform .3s;
  animation:fadeSlideUp .6s ease var(--delay) both;
}
.featured-card:hover{transform:translateY(-8px)}
.card-border-anim{
  position:absolute;inset:-50%;
  background:conic-gradient(from 0deg,var(--red),var(--yellow),var(--green),var(--blue),var(--red));
  animation:rotateBorder 3s linear infinite;
  z-index:0;
}
@keyframes rotateBorder{to{transform:rotate(360deg)}}
.card-inner{
  position:relative;z-index:1;background:var(--bg2);border-radius:14px;padding:32px;
  text-align:center;
}
/* HOLOGRAPHIC SHIMMER */
.featured-card:hover .card-inner{
  background:linear-gradient(135deg,
    rgba(234,67,53,.05),rgba(251,188,4,.05),
    rgba(52,168,83,.05),rgba(66,133,244,.05));
  background-size:400% 400%;
  animation:holoShimmer 1.5s ease infinite;
}
@keyframes holoShimmer{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
.card-icon-wrap{width:80px;height:80px;margin:0 auto 20px;border-radius:16px;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.card-icon{width:64px;height:64px;object-fit:contain}
.card-title{font-size:1.25rem;font-weight:700;margin-bottom:8px}
.card-tagline{color:var(--text2);font-size:.9rem;margin-bottom:20px}
.btn-install{
  display:inline-block;padding:10px 28px;border-radius:50px;font-weight:600;font-size:.85rem;
  background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;
  transition:box-shadow .3s,transform .2s;
}
.btn-install:hover{box-shadow:0 0 20px rgba(66,133,244,.5);transform:scale(1.05)}

/* ALL EXTENSIONS */
.ext-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;max-width:1100px;margin:0 auto;padding:0 24px}
.ext-card{
  display:flex;align-items:center;gap:16px;padding:16px 20px;
  background:var(--bg2);border-radius:12px;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .3s;
  animation:fadeSlideUp .5s ease var(--delay) both;
}
.ext-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.ext-accent{position:absolute;top:0;left:0;width:100%;height:3px;background:var(--accent)}
.ext-icon{width:40px;height:40px;border-radius:8px;flex-shrink:0}
.ext-info{flex:1;min-width:0}
.ext-name{font-size:.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ext-tag{font-size:.8rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ext-btn{
  padding:6px 18px;border-radius:50px;font-size:.8rem;font-weight:600;
  background:var(--bg3);color:var(--text);border:1px solid rgba(255,255,255,.1);
  transition:background .2s,border-color .2s;flex-shrink:0;
}
.ext-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* HOW IT WORKS */
.steps{display:flex;gap:40px;justify-content:center;align-items:center;flex-wrap:wrap;max-width:900px;margin:0 auto;padding:0 24px}
.step{text-align:center;flex:1;min-width:200px;position:relative}
.step-icon{
  width:80px;height:80px;border-radius:50%;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;font-size:2rem;
  border:2px solid var(--step-color);color:var(--step-color);
  box-shadow:0 0 20px color-mix(in srgb,var(--step-color) 30%,transparent);
  animation:stepGlow 2s ease-in-out infinite alternate;
}
@keyframes stepGlow{0%{box-shadow:0 0 10px color-mix(in srgb,var(--step-color) 20%,transparent)}100%{box-shadow:0 0 30px color-mix(in srgb,var(--step-color) 40%,transparent)}}
.step-title{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.step-desc{font-size:.85rem;color:var(--text2)}
.step-line{
  width:60px;height:2px;flex-shrink:0;
  background:linear-gradient(90deg,var(--blue),var(--green));
  position:relative;
}
.step-line::after{
  content:'';position:absolute;top:-2px;left:0;width:6px;height:6px;border-radius:50%;
  background:var(--green);animation:dotMove 2s linear infinite;
}
@keyframes dotMove{0%{left:0}100%{left:100%}}

/* PRIVACY */
.privacy{text-align:center;padding:100px 24px}
.shield{
  font-size:5rem;display:block;margin-bottom:24px;
  filter:drop-shadow(0 0 30px rgba(52,168,83,.4));
  animation:shieldPulse 3s ease-in-out infinite;
}
@keyframes shieldPulse{0%,100%{filter:drop-shadow(0 0 20px rgba(52,168,83,.3))}50%{filter:drop-shadow(0 0 50px rgba(52,168,83,.6))}}
.privacy-title{font-size:clamp(1.5rem,3vw,2.2rem);font-weight:800;margin-bottom:12px;color:var(--green)}
.privacy-desc{color:var(--text2);max-width:600px;margin:0 auto;font-size:1.05rem}

/* BLOG */
.blog-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;max-width:1100px;margin:0 auto;padding:0 24px}
.blog-card{
  background:var(--bg2);border-radius:12px;padding:28px;position:relative;overflow:hidden;
  transition:transform .3s;animation:fadeSlideUp .6s ease var(--delay) both;
}
.blog-card:hover{transform:translateY(-5px)}
.blog-accent{position:absolute;top:0;left:0;width:100%;height:3px;background:var(--accent)}
.blog-date{font-size:.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.blog-title{font-size:1.1rem;font-weight:700;margin:12px 0 8px}
.blog-desc{font-size:.85rem;color:var(--text2);margin-bottom:16px}
.blog-link{font-size:.85rem;color:var(--blue);font-weight:600}

/* SIGNUP */
.signup{text-align:center;padding:80px 24px}
.signup-title{font-size:clamp(1.5rem,3vw,2rem);font-weight:800;margin-bottom:8px}
.signup-desc{color:var(--text2);margin-bottom:32px}
.signup-form{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:500px;margin:0 auto}
.signup-input{
  flex:1;min-width:200px;padding:14px 20px;border-radius:50px;border:2px solid var(--bg3);
  background:var(--bg2);color:var(--text);font-size:1rem;outline:none;
  transition:border-color .3s,box-shadow .3s;
}
.signup-input:focus{border-color:var(--blue);box-shadow:0 0 20px rgba(66,133,244,.2)}
.signup-btn{
  padding:14px 32px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;
  font-weight:700;font-size:1rem;cursor:pointer;transition:transform .2s;
}
.signup-btn:hover{transform:scale(1.05)}

/* FOOTER */
footer{
  text-align:center;padding:40px 24px;color:var(--text2);font-size:.85rem;
  border-top:2px solid;
  border-image:linear-gradient(90deg,var(--red),var(--yellow),var(--green),var(--blue)) 1;
}
footer a{color:var(--blue)}

/* SCROLL ANIMATIONS */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}
.scroll-reveal{opacity:0;transform:translateY(40px);transition:opacity .6s ease,transform .6s ease}
.scroll-reveal.visible{opacity:1;transform:translateY(0);transition-delay:var(--delay,0s)}

/* PARALLAX */
.parallax-section{transform:translateZ(0);will-change:transform}

/* RESPONSIVE */
@media(max-width:768px){
  .hero-title{font-size:clamp(2.5rem,10vw,4rem)}
  .hero-sub{font-size:1rem}
  .stats{gap:24px}
  .stat-num{font-size:2rem}
  .featured-grid{grid-template-columns:1fr}
  .ext-grid{grid-template-columns:1fr}
  .steps{flex-direction:column}
  .step-line{width:2px;height:40px;background:linear-gradient(180deg,var(--blue),var(--green))}
  .step-line::after{animation:dotMoveV 2s linear infinite;top:0;left:-2px}
  .blog-grid{grid-template-columns:1fr}
}
@keyframes dotMoveV{0%{top:0}100%{top:100%}}
@media(max-width:480px){
  .hero{padding:80px 16px 60px}
  .signup-form{flex-direction:column}
  .signup-input,.signup-btn{width:100%}
}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}</style>
</head>

<script>
// Counter animation
function animateCounters(){
  document.querySelectorAll('.stat-num').forEach(function(el){
    var target=parseFloat(el.dataset.target);
    var prefix=el.dataset.prefix||'';
    var suffix=el.dataset.suffix||'';
    var isFloat=target%1!==0;
    var duration=2000;
    var start=performance.now();
    function update(now){
      var elapsed=now-start;
      var progress=Math.min(elapsed/duration,1);
      var eased=1-Math.pow(1-progress,3);
      var current=eased*target;
      el.textContent=prefix+(isFloat?current.toFixed(2):Math.round(current))+suffix;
      if(progress<1)requestAnimationFrame(update);
    }
    requestAnimationFrame(update);
  });
}

// Scroll reveal
var observer=new IntersectionObserver(function(entries){
  entries.forEach(function(e){
    if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target)}
  });
},{threshold:.1,rootMargin:'0px 0px -50px 0px'});
document.querySelectorAll('.scroll-reveal').forEach(function(el){observer.observe(el)});

// Counter trigger
var counterDone=false;
var statObs=new IntersectionObserver(function(entries){
  if(entries[0].isIntersecting&&!counterDone){counterDone=true;animateCounters()}
},{threshold:.5});
var statsEl=document.querySelector('.stats');
if(statsEl)statObs.observe(statsEl);

// Parallax
window.addEventListener('scroll',function(){
  var scrolled=window.pageYOffset;
  document.querySelectorAll('.parallax-section').forEach(function(s,i){
    var speed=0.02*(i%3+1);
    s.style.transform='translateY('+(-scrolled*speed)+'px)';
  });
},{passive:true});
</script>
